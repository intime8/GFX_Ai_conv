<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GFX Ai Conv</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>GFX Ai Conv</h1>
          <p id="versionLabel">Local converter</p>
        </div>
        <button id="updateButton" title="Check for updates" type="button">Updates</button>
      </header>

      <section class="toolbar" aria-label="Conversion mode">
        <button class="mode-button active" type="button" data-mode="png">PNG</button>
        <button class="mode-button" type="button" data-mode="video">H.264 MP4</button>
      </section>

      <section class="controls">
        <div class="output-row">
          <label for="outputDir">Output folder</label>
          <input id="outputDir" type="text" readonly placeholder="Choose a folder before adding files">
          <button id="chooseOutput" type="button">Choose</button>
        </div>

        <div class="video-settings hidden" id="videoSettings">
          <label class="field" for="durationInput">
            <span>Duration (sec)</span>
            <input id="durationInput" type="number" min="4" max="15" step="1" value="4">
          </label>

          <label class="checkline" for="align16Input">
            <input id="align16Input" type="checkbox" checked>
            <span>16 px grid</span>
          </label>

          <label class="field" for="qualityInput">
            <span>Quality</span>
            <select id="qualityInput">
              <option value="visual">Visually lossless</option>
              <option value="lossless">Lossless H.264</option>
            </select>
          </label>

          <label class="field" for="encoderInput">
            <span>Encoder</span>
            <select id="encoderInput">
              <option value="gpu">NVIDIA GPU</option>
              <option value="cpu">CPU x264</option>
            </select>
          </label>
        </div>
      </section>

      <section class="dropzone disabled" id="dropzone">
        <input id="filePicker" type="file" multiple disabled>
        <div class="dropzone-inner">
          <strong id="dropTitle">Choose output folder first</strong>
          <span id="dropSubtitle">Files and EXR folders can be added after output is set</span>
        </div>
      </section>

      <section class="status-panel">
        <div class="status-header">
          <div>
            <h2>Queue</h2>
            <p id="queueSummary">0 items</p>
          </div>
          <div class="queue-actions">
            <button id="startQueue" type="button">Start</button>
            <button id="pauseQueue" type="button">Pause</button>
            <button id="stopQueue" type="button">Stop</button>
            <button id="clearQueue" type="button">Clear</button>
            <button id="openOutput" type="button">Open folder</button>
          </div>
        </div>
        <ul class="file-list" id="fileList"></ul>
      </section>

      <section class="modal hidden" id="updateModal" aria-hidden="true">
        <div class="modal-panel">
          <h2 id="updateTitle">Update available</h2>
          <p id="updateBody"></p>
          <div class="modal-progress hidden" id="updateProgressWrap">
            <div class="progress-track">
              <div class="progress-fill" id="updateProgressFill"></div>
            </div>
            <span id="updateProgressText">0%</span>
          </div>
          <div class="modal-actions">
            <button id="downloadUpdate" type="button">Download and install</button>
            <button id="closeUpdateModal" type="button">Later</button>
          </div>
        </div>
      </section>

      <div class="toast hidden" id="toast"></div>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
